name: Vendor logback-android + mail

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone logback-android v_3.0.0
        run: |
          wget https://github.com/tony19/logback-android/archive/refs/tags/v_3.0.0.zip
          unzip v_3.0.0.zip
          mkdir -p wallet/src/wallet/java/
          cp -r logback-android-v_3.0.0/logback-android/src/main/java/ch wallet/src/wallet/java/
          rm -rf v_3.0.0.zip logback-android-v_3.0.0

      - name: Clone android-mail 1.6.7
        run: |
          wget https://repo1.maven.org/maven2/com/sun/mail/android-mail/1.6.7/android-mail-1.6.7-sources.jar
          mkdir -p temp_mail
          cd temp_mail && unzip ../android-mail-1.6.7-sources.jar
          mkdir -p ../wallet/src/wallet/java/
          cp -r javax ../wallet/src/wallet/java/
          cp -r com ../wallet/src/wallet/java/
          cd .. && rm -rf android-mail-1.6.7-sources.jar temp_mail

      - name: Strip activation + AWT + DB
        run: |
          # Xoá nguyên javax.activation vì dùng java.awt
          rm -rf wallet/src/wallet/java/javax/activation
          
          # Xoá mấy class trong javax.mail dính activation/AWT
          rm -f wallet/src/wallet/java/javax/mail/internet/MimeUtility.java
          rm -f wallet/src/wallet/java/javax/mail/internet/MimeBodyPart.java
          rm -f wallet/src/wallet/java/javax/mail/internet/MimeMessage.java
          rm -f wallet/src/wallet/java/javax/mail/internet/MimeMultipart.java
          rm -f wallet/src/wallet/java/javax/mail/internet/MimePartDataSource.java
          rm -f wallet/src/wallet/java/javax/mail/internet/PreencodedMimeBodyPart.java
          rm -f wallet/src/wallet/java/javax/mail/internet/SharedInputStream.java
          rm -f wallet/src/wallet/java/javax/mail/util/ByteArrayDataSource.java
          rm -f wallet/src/wallet/java/javax/mail/Part.java
          rm -f wallet/src/wallet/java/javax/mail/BodyPart.java
          rm -f wallet/src/wallet/java/javax/mail/Multipart.java
          rm -f wallet/src/wallet/java/javax/mail/MultipartDataSource.java
          
          # Xoá SQLiteAppender vì nó dùng db package
          rm -f wallet/src/wallet/java/ch/qos/logback/classic/android/SQLiteAppender.java
          rm -rf wallet/src/wallet/java/ch/qos/logback/classic/db/

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vendor logback-android 3.0.0 + android-mail, strip activation/AWT"
          file_pattern: wallet/src/wallet/java/**